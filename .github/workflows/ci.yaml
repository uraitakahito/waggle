name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: waggle
          POSTGRES_PASSWORD: waggle
          POSTGRES_DB: waggle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waggle -d waggle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://waggle:waggle@localhost:5432/waggle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: node dist/db/migrate.js

      - name: OpenAPI drift check
        run: npm run openapi:check
