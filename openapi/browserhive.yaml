openapi: 3.1.0
info:
  title: BrowserHive Capture API
  version: 1.0.0
  description: |
    Web page capture API. Submits URLs to capture as PNG/WebP screenshots,
    HTML, or MHTML (single-file archive). Uses fire-and-forget
    pattern: requests are accepted immediately and processed asynchronously
    by the capture coordinator.
  license:
    name: The Unlicense
    identifier: Unlicense
# servers[0].url is the source of truth for the SDK's default baseUrl.
# @hey-api/openapi-ts bakes it into src/http/generated/client.gen.ts at
# generation time, so example clients (e.g. examples/data-client.ts)
# inherit it without a hardcoded fallback.
servers:
  - url: http://localhost:8080
    description: Local development server
# The Capture API is unauthenticated; declare it explicitly so the
# `security-defined` lint rule passes without per-operation duplication.
security: []
paths:
  /v1/captures:
    post:
      operationId: submitCapture
      summary: Submit a capture request
      description: |
        Accept a capture request for a single URL. Returns 202 immediately
        on acceptance; the actual capture is processed asynchronously.

        The `wacz` capture format records every HTTP exchange Chromium
        performs during the capture (including resources loaded later by
        scroll-triggered lazy loaders) into a [WACZ archive](https://specs.webrecorder.net/wacz/1.0.0/)
        replayable in [ReplayWeb.page](https://replayweb.page/). Server-state
        dependent traffic — auth flows with expiring tokens, live
        WebSocket / SSE streams, WebRTC — is **not** in scope: the WARC
        records the original exchange but replay cannot reproduce values
        that change every load.

        ## Filename format

        Captured artifacts are uploaded to the configured S3-compatible
        bucket as `s3://<bucket>/[<keyPrefix>/]<filename>`. The filename
        is derived from the task identifiers as follows:

        | Case | Format | Example |
        |------|--------|---------|
        | With labels | `{taskId}_{labels}.{ext}` | `550e8400-..._my-label.png` |
        | Without labels | `{taskId}.{ext}` | `550e8400-....png` |
        | Labels + correlationId | `{taskId}_{correlationId}_{labels}.{ext}` | `550e8400-..._abc123_my-label.png` |
        | correlationId only | `{taskId}_{correlationId}.{ext}` | `550e8400-..._abc123.png` |
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureRequest"
            examples:
              dismissBanners:
                summary: Dismiss cookie-consent banners
                description: |
                  Captures The Guardian (which uses Sourcepoint as its
                  consent-management platform). With `dismissBanners: true`
                  the consent dialog — and any large fixed/sticky overlay
                  caught by the heuristic fallback — are removed before the
                  screenshot is taken. See the `dismissBanners` field of
                  `CaptureRequest` for the resulting `dismissReport` shape.
                value:
                  url: https://www.theguardian.com
                  labels: [guardian]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  dismissBanners: true
              acceptLanguageJa:
                summary: Capture the Japanese variant of a multilingual site
                description: |
                  Sends `Accept-Language: ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7`
                  on the upstream request so sites that vary content by language
                  (Google, Wikipedia, locale-redirecting corporate sites, etc.)
                  return the Japanese rendition.
                value:
                  url: https://www.google.com/
                  labels: [google, ja]
                  captureFormats:
                    png: true
                    webp: false
                    html: true
                    links: false
                    mhtml: false
                    wacz: false
                  acceptLanguage: ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7
              linksOnly:
                summary: Extract links without taking a screenshot
                description: |
                  Skips PNG/WebP/HTML capture and writes only the link list
                  as `{taskId}_..._labels.links.json`. Useful for crawl-driver
                  use cases where only URL discovery is needed.
                value:
                  url: https://www.example.com/
                  labels: [example]
                  captureFormats:
                    png: false
                    webp: false
                    html: false
                    links: true
                    mhtml: false
                    wacz: false
              waczOnly:
                summary: Record the session as a WACZ replayable archive
                description: |
                  Skips every other format and records all HTTP exchanges
                  Chromium performs during the capture (including resources
                  loaded by scroll-triggered lazy loaders) as a single
                  `.wacz` archive. Open the resulting file in
                  [ReplayWeb.page](https://replayweb.page/) for an
                  interactive replay, or embed via the
                  `<replay-web-page>` web component.

                  Out of scope: server-state-dependent dynamic traffic
                  (expiring auth tokens, live WebSocket / SSE streams,
                  WebRTC). The WARC records the original exchange but
                  replay can't reproduce values that change every load.
                value:
                  url: https://www.example.com/
                  labels: [example]
                  captureFormats:
                    png: false
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: true
              mhtmlOnly:
                summary: Capture as MHTML single-file archive
                description: |
                  Skips raster screenshot / HTML / link extraction
                  and writes only an MHTML archive as
                  `{taskId}_..._labels.mhtml`. Uses Chromium's
                  `Page.captureSnapshot` CDP method to embed every CSS /
                  image / font / inline script into one MIME multipart
                  file. Open the resulting `.mhtml` directly in Chrome
                  or Edge for an offline-faithful render of the captured
                  page (Firefox / Safari require an extension). Prefer
                  this over the raw `html` format when the captured
                  artifact must render correctly outside the original
                  origin.
                value:
                  url: https://www.example.com/
                  labels: [example]
                  captureFormats:
                    png: false
                    webp: false
                    html: false
                    links: false
                    mhtml: true
                    wacz: false
              dismissBannersInline:
                summary: Page-specific dismissal selectors (inline)
                description: |
                  Adds two custom overlay selectors on top of the curated
                  CMP defaults, drops the noisy `TrustArc` defaults, and
                  lowers the heuristic z-index threshold so a smaller
                  paywall overlay still gets removed. Selectors that fail
                  to parse are skipped silently (best-effort).
                value:
                  url: https://example.com/article
                  labels: [example, paywall]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  dismissBanners:
                    useDefaults: true
                    extraSelectors:
                      - "#site-paywall"
                      - ".newsletter-takeover"
                    excludeFrameworks: [TrustArc]
                    heuristic:
                      enabled: true
                      minZIndex: 100
              customViewport:
                summary: Capture at a specific viewport
                description: |
                  Overrides the server-side default viewport for this
                  request only — renders at Full HD (`1920 × 1080`)
                  before taking the screenshot. Useful for forcing the
                  desktop variant of a responsive site.
                value:
                  url: https://www.example.com/
                  labels: [example, fhd]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  viewport:
                    width: 1920
                    height: 1080
              fullPageScreenshot:
                summary: Capture the full document height
                description: |
                  Overrides the server-side default to capture the
                  entire scrollable height of the page (Chromium scrolls
                  and stitches). The viewport stays at the configured
                  default; only the screenshot extent grows.
                value:
                  url: https://www.example.com/
                  labels: [example, full]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  fullPage: true
              dismissBannersStrict:
                summary: Strict mode (fail capture if dismissal fails)
                description: |
                  Opts out of the default best-effort behaviour with
                  `failOnError: true`. If banner dismissal hits the 5s
                  in-page timeout, if `page.evaluate` rejects, or if any
                  `extraSelectors` entry is invalid CSS, the capture
                  fails (`status: "failed"` / `"timeout"`) and consumes
                  one slot of the retry budget. Use this when a missing
                  banner-dismiss invalidates the captured artifact for
                  your downstream pipeline.
                value:
                  url: https://example.com/article
                  labels: [example, strict]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  dismissBanners:
                    useDefaults: true
                    extraSelectors:
                      - "#known-paywall"
                    failOnError: true
              keepCookiesAcrossCaptures:
                summary: Preserve cookies between captures (SSO-walled site)
                description: |
                  Skips only the inter-task cookie wipe so the next capture
                  on this worker's persistent tab inherits the cookies set
                  by this one. The `about:blank` navigation still runs, so
                  origin-scoped storage and the JS execution context are
                  still discarded — only browser-scoped cookies survive.
                  Useful for crawling pages behind an SSO login that was
                  captured in a previous request.
                value:
                  url: https://internal.example.com/dashboard
                  labels: [sso, dashboard]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  resetState:
                    cookies: false
              noResetAtAll:
                summary: Stateful crawl — keep everything between captures
                description: |
                  Disables both axes of the inter-task wipe. Cookies, DOM
                  context, in-flight timers, and origin-scoped storage all
                  carry over to the next task on this worker. The
                  `boolean` short form `false` is equivalent to the object
                  form `{ cookies: false, pageContext: false }`. Use this
                  for multi-page journeys against a single origin where
                  state continuity is the point of the capture.
                value:
                  url: https://example.com/step-2
                  labels: [journey, step2]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  resetState: false
              cookiesOnlyReset:
                summary: Wipe cookies only, keep DOM context
                description: |
                  Clears browser-scoped cookies between captures but skips
                  the `about:blank` navigation, so DOM listeners / timers
                  and origin-scoped storage carry over. Less commonly
                  useful than the inverse (preserving cookies); included
                  here mainly for symmetry. Note that with `pageContext:
                  false`, the next task's `page.goto` is what eventually
                  tears down the previous document — until then, the
                  inter-task gap has the previous task's residue.
                value:
                  url: https://example.com/page
                  labels: [example]
                  captureFormats:
                    png: true
                    webp: false
                    html: false
                    links: false
                    mhtml: false
                    wacz: false
                  resetState:
                    cookies: true
                    pageContext: false
      responses:
        "202":
          description: Request accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureAcceptance"
        "400":
          description: Validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: URL already in queue (when rejectDuplicateUrls is enabled)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: No operational workers available
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/status:
    get:
      operationId: getStatus
      summary: Get capture coordinator status
      description: |
        Returns the current status of the queue and worker pool, including a
        snapshot of pending tasks (head of the queue, capped by
        `pendingLimit`).
      parameters:
        - name: pendingLimit
          in: query
          required: false
          description: |
            Maximum number of pending tasks to include in
            `queue.pendingTasks`. Defaults to 50; clamp at 200 to bound the
            response size.
          schema:
            type: integer
            minimum: 0
            maximum: 200
            default: 50
      responses:
        "200":
          description: Current status of queue and workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Invalid query parameter
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  schemas:
    CaptureFormats:
      type: object
      description: Capture format flags. At least one must be true.
      required: [png, webp, html, links, mhtml, wacz]
      additionalProperties: false
      properties:
        png:
          type: boolean
        webp:
          type: boolean
          description: |
            Capture a WebP screenshot via Chromium's
            `Page.captureScreenshot { format: "webp" }`. Set
            `--screenshot-quality` (or `BROWSERHIVE_SCREENSHOT_QUALITY`)
            to control the lossy quality (1–100); when omitted,
            Chromium's default is used. Uploaded as
            `{taskId}_..._labels.webp`.
        html:
          type: boolean
        links:
          type: boolean
          description: |
            Extract `<a href>` links from the rendered page and upload the
            list as `{taskId}_..._labels.links.json` to the configured
            S3 bucket (same naming pattern as the other capture formats).
            Useful as the discovery side of an external crawl driver.
        mhtml:
          type: boolean
          description: |
            Capture the rendered page as MHTML (MIME multipart archive)
            via Chromium's CDP `Page.captureSnapshot` and upload it as
            `{taskId}_..._labels.mhtml` to the configured S3 bucket (same
            naming pattern as the other capture formats). All resources —
            CSS, images, fonts, inline scripts — are embedded in a single
            file, so the captured page renders identically when opened
            offline (no broken relative URLs, unlike the raw `html`
            format). Chrome / Edge open `.mhtml` files directly; Firefox /
            Safari require an extension.
        wacz:
          type: boolean
          description: |
            Record every HTTP exchange Chromium performs during the capture
            into a [WACZ](https://specs.webrecorder.net/wacz/1.0.0/) archive
            and upload it as `{taskId}_..._labels.wacz` (a zip file) to the
            configured S3 bucket. Replay with
            [ReplayWeb.page](https://replayweb.page/) — drag-and-drop the
            file or load via the `<replay-web-page>` web component.

            Captures resources fetched throughout the entire session,
            including those triggered by future scroll-driven lazy loaders.
            Cookie / `Set-Cookie` / `Authorization` headers are recorded in
            full so static replay matches the original exchange.

            **Out of scope:** server-state-dependent dynamic traffic. The
            WARC records the exchange faithfully but replay cannot
            reproduce values that change every load — expiring auth tokens
            (JWT / OAuth), per-request CSRF tokens, live WebSocket / SSE
            streams, WebRTC.
    CaptureRequest:
      type: object
      required: [url, captureFormats]
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          description: Target URL to capture
        labels:
          type: array
          items:
            type: string
          default: []
          description: Display labels (used for filename)
        correlationId:
          type: string
          description: Correlation ID provided by the client for tracking
        captureFormats:
          $ref: "#/components/schemas/CaptureFormats"
        acceptLanguage:
          type: string
          minLength: 1
          maxLength: 200
          # Printable ASCII only — disallows CR / LF / NUL and other control
          # characters so a malicious value cannot inject additional HTTP
          # headers when forwarded via Network.setExtraHTTPHeaders.
          pattern: "^[\\x20-\\x7e]+$"
          description: |
            Value to send as the upstream `Accept-Language` header for this
            capture only. Useful for sites whose content varies by language
            (locale-redirecting corporate top pages, search engines,
            Wikipedia, etc.).

            Format follows IETF BCP 47 quality-list syntax, e.g.
            `ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7`.

            When omitted, no `Accept-Language` header is set explicitly and
            the upstream Chromium uses its built-in default (controlled by
            its `--lang` startup flag / OS locale).
        dismissBanners:
          oneOf:
            - type: boolean
            - $ref: "#/components/schemas/DismissSpec"
          description: |
            Run banner / modal dismissal before capturing. Removes known
            consent-management-platform overlays and large fixed/sticky
            overlays via heuristic.

            Two shapes are accepted:

            - `boolean` — `false` (or omitted) skips dismissal entirely;
              `true` is equivalent to `{ "useDefaults": true }` (the curated
              CMP list plus the default heuristic).
            - `DismissSpec` — inline customization. Use `extraSelectors` to
              add page-specific overlay selectors, `excludeFrameworks` to
              suppress a noisy default, or `heuristic.enabled: false` to
              disable the size/z-index fallback.

            When enabled, the server log line for the completed task
            includes a `dismissReport`:

            ```json
            {
              "msg": "Task completed",
              "url": "https://www.theguardian.com",
              "dismissReport": {
                "framework": "Sourcepoint",
                "removedSelectors": ["[id^=\"sp_message_container\"]"],
                "removedOverlayCount": 1
              }
            }
            ```

            - `framework` — matched CMP name, `"custom"` when only an
              `extraSelectors` entry fired, `"heuristic"` when only the
              fallback fired, or `null` when nothing matched.
            - `removedSelectors` — exact CSS selectors whose elements were
              removed in the CMP-selector pass (includes both default-CMP
              and custom `extraSelectors` matches).
            - `removedOverlayCount` — number of elements removed by the
              heuristic pass (fixed/sticky elements with high `z-index`
              covering ≥`minViewportCoverageRatio` of the viewport,
              excluding semantic landmarks).

            By default best-effort: dismissal failures (in-page evaluate
            timeout, the `page.evaluate` promise rejecting, or an invalid
            CSS selector in `extraSelectors` raising `SyntaxError`) are
            swallowed and the offending entry is skipped, so a malformed
            page or a typo cannot fail the capture.

            Set `dismissBanners.failOnError: true` to opt out — failures
            then fail the entire capture (`status: "failed"` or
            `"timeout"` in the worker log) and `dismissReport` is **not**
            present on the result; inspect `errorDetails` instead. The
            failure is treated like any other capture failure for retry
            accounting (consumes one slot of `--max-retry-count`).
        viewport:
          type: object
          required: [width, height]
          additionalProperties: false
          properties:
            width:
              type: integer
              minimum: 1
              maximum: 7680
            height:
              type: integer
              minimum: 1
              maximum: 4320
          description: |
            Per-request browser viewport in CSS pixels. When provided,
            `page.setViewport` is called with these dimensions before
            navigating to the target URL — useful for sites whose layout
            varies by viewport size (responsive top pages, mobile-only
            content) or for capturing at a specific resolution.

            When omitted, the server-side default applies (configured via
            `--viewport-width` / `--viewport-height` /
            `BROWSERHIVE_VIEWPORT_*`; the built-in default is
            `1280 × 800`).

            Bounds (`1–7680 × 1–4320`) cover up to 8K rendering and exist
            only as a sanity guard against runaway memory use in
            Chromium — typical values are `1280 × 800` (desktop default),
            `1920 × 1080` (Full HD), or `375 × 667` (iPhone SE).
        fullPage:
          type: boolean
          description: |
            When `true`, the PNG / WebP screenshot extends below the
            viewport to capture the full document height (Chromium scrolls
            and stitches the result). When `false` or omitted, only the
            viewport-sized region is captured.

            When omitted, the server-side default applies (configured via
            `--screenshot-full-page` / `BROWSERHIVE_SCREENSHOT_FULL_PAGE`;
            the built-in default is `false`).

            Has no effect on the `html` / `links` formats.
        resetState:
          oneOf:
            - type: boolean
            - $ref: "#/components/schemas/ResetStateSpec"
          description: |
            Per-request control of the inter-task wipe applied to the
            worker's persistent Chromium tab AFTER this capture completes.
            BrowserHive holds one tab per worker for its entire lifetime,
            so without a wipe, cookies / DOM listeners / origin-scoped
            storage from this capture would bleed into whatever task this
            worker processes next.

            Two shapes are accepted:

            - `boolean` — `true` forces a full wipe (both axes), `false`
              skips the wipe entirely (stateful carry-over). Both ignore
              server-side defaults.
            - `ResetStateSpec` — per-axis override; omitted fields fall
              back to the server-side default
              (`--no-reset-cookies` / `--no-reset-page-context` /
              `BROWSERHIVE_RESET_COOKIES` / `BROWSERHIVE_RESET_PAGE_CONTEXT`).

            When omitted, the server-side default applies (built-in
            default: both axes wipe, matching the long-standing behaviour
            of clearing state between captures).

            See `ResetStateSpec` for the per-axis semantics and the
            "two axes, not three" rationale (origin-scoped storage is
            inseparable from `pageContext`).
    DismissHeuristicSpec:
      type: object
      additionalProperties: false
      description: |
        Heuristic-pass thresholds for the second dismissal pass (the
        size / z-index fallback that removes large fixed/sticky overlays
        that don't match a known CMP selector). All fields are optional;
        omitted fields fall back to server-side defaults
        (`enabled: true`, `minViewportCoverageRatio: 0.3`,
        `minZIndex: 1000`).
      properties:
        enabled:
          type: boolean
          description: |
            When `false`, the heuristic pass is skipped entirely. Useful
            when the curated CMP selectors are sufficient and the
            heuristic is producing false positives on a particular page.
        minViewportCoverageRatio:
          type: number
          minimum: 0
          maximum: 1
          description: |
            Minimum fraction of the viewport an overlay must cover to
            be removed (`width × height / (innerWidth × innerHeight)`).
            Lower values are more aggressive.
        minZIndex:
          type: integer
          minimum: 0
          description: |
            Minimum computed `z-index` an element must have to qualify
            as an overlay candidate. Lower values are more aggressive.
    ResetStateSpec:
      type: object
      additionalProperties: false
      description: |
        Per-axis control of the inter-task wipe. Each field omitted falls
        back to the server-side default (`CaptureConfig.resetPageState`,
        configurable via `--no-reset-cookies` / `--no-reset-page-context`
        and the matching `BROWSERHIVE_RESET_*` env vars; the built-in
        default is both axes true).

        Two axes (not three): `localStorage` / `sessionStorage` /
        `IndexedDB` are origin-scoped, so navigating to `about:blank`
        already disposes them. Exposing a separate "storage" knob would
        either duplicate `pageContext` or describe a state the API cannot
        actually deliver, so the two are coupled under one knob.
      properties:
        cookies:
          type: boolean
          description: |
            When `true`, browser-scoped cookies are cleared via CDP
            `Network.clearBrowserCookies` after each capture. When
            `false`, cookies set during this capture survive into the
            next task on this worker — useful for keeping an SSO session
            alive across multiple captures. Independent of `pageContext`
            (cookies live on the browser, not the page).
        pageContext:
          type: boolean
          description: |
            When `true`, the worker navigates to `about:blank` after each
            capture, which tears down the JS execution context (closures,
            timers, listeners) and disposes origin-scoped storage
            (`localStorage` / `sessionStorage` / `IndexedDB`) as a
            side-effect. When `false`, all of those carry over until the
            next `page.goto` supersedes the previous document.
    DismissSpec:
      type: object
      additionalProperties: false
      description: |
        Inline customization of banner / modal dismissal for a single
        capture. All fields are optional; omitted fields fall back to
        server-side defaults equivalent to `dismissBanners: true`.

        `extraSelectors` matches are reported in `dismissReport` as
        `framework: "custom"`. By default, selectors that fail to parse
        (`querySelector` SyntaxError) are skipped silently so a typo in
        one entry cannot block the rest — set `failOnError: true` to opt
        into strict propagation.
      properties:
        useDefaults:
          type: boolean
          description: |
            When `true` (default), the curated `KNOWN_CMP_ENTRIES` list
            (OneTrust, Cookiebot, Sourcepoint, …) is included. When
            `false`, only `extraSelectors` is used in pass 1.
        extraSelectors:
          type: array
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 200
            # Printable ASCII only — disallows CR / LF / NUL and other
            # control characters. CSS selector character class is far
            # narrower; this is the safety floor.
            pattern: "^[\\x20-\\x7e]+$"
          description: |
            Additional CSS selectors to remove in pass 1, on top of the
            (optional) defaults selected by `useDefaults`. Each successful
            removal is reported in `dismissReport.removedSelectors` and
            attributed to `framework: "custom"`.
        excludeFrameworks:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 100
          description: |
            Names of default CMP frameworks to suppress when
            `useDefaults: true`. Use this to silence a default that is
            producing false positives on a specific page (e.g.
            `["TrustArc"]`). Names must match the `framework` field of
            an entry in `KNOWN_CMP_ENTRIES`.
        heuristic:
          $ref: "#/components/schemas/DismissHeuristicSpec"
        failOnError:
          type: boolean
          description: |
            When `true`, a dismissal failure (in-page evaluate timeout,
            the `page.evaluate` promise rejecting, or a `querySelector`
            SyntaxError raised by an entry in `extraSelectors`) fails
            the entire capture (`status: "failed"` or `"timeout"`)
            instead of being swallowed into an empty `dismissReport`.

            Default `false` — preserves the long-standing best-effort
            contract where a malformed page or a typo in a custom
            selector cannot fail the capture. Strict mode failures are
            classified by the existing error pipeline (timeout vs
            internal vs connection) and consume one slot of the worker's
            retry budget like any other capture failure.
    CaptureAcceptance:
      type: object
      required: [accepted, taskId]
      additionalProperties: false
      properties:
        accepted:
          type: boolean
          description: Always true on 202 (errors return 4xx/5xx with Problem body)
        taskId:
          type: string
          format: uuid
          description: Server-generated task ID
        correlationId:
          type: string
          description: Correlation ID echoed from the request, when provided
    Problem:
      type: object
      description: RFC 7807 Problem Details
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
    WorkerHealth:
      type: string
      enum: [ready, busy, error, disconnected]
    ErrorType:
      type: string
      enum: [http, timeout, connection, internal]
    ErrorTaskInfo:
      type: object
      required: [taskId, url, labels]
      additionalProperties: false
      properties:
        taskId:
          type: string
        url:
          type: string
        labels:
          type: array
          items:
            type: string
    ErrorRecord:
      type: object
      required: [type, message, timestamp]
      additionalProperties: false
      properties:
        type:
          $ref: "#/components/schemas/ErrorType"
        message:
          type: string
        httpStatusCode:
          type: integer
        httpStatusText:
          type: string
        timeoutMs:
          type: integer
        timestamp:
          type: string
          format: date-time
        task:
          $ref: "#/components/schemas/ErrorTaskInfo"
    BrowserOptions:
      type: object
      required: [browserUrl]
      additionalProperties: false
      properties:
        browserUrl:
          type: string
    CurrentTask:
      type: object
      description: |
        Snapshot of the task a worker is currently processing. Present only
        when the worker is in the `busy` health state. `elapsedMs` is
        computed at response-build time as `now - startedAt`.
      required: [taskId, url, labels, startedAt, elapsedMs, retryCount]
      additionalProperties: false
      properties:
        taskId:
          type: string
        url:
          type: string
        labels:
          type: array
          items:
            type: string
        correlationId:
          type: string
        startedAt:
          type: string
          format: date-time
        elapsedMs:
          type: integer
        retryCount:
          type: integer
    WorkerInfo:
      type: object
      required:
        - index
        - browserOptions
        - health
        - processedCount
        - errorCount
        - errorHistory
      additionalProperties: false
      properties:
        index:
          type: integer
        browserOptions:
          $ref: "#/components/schemas/BrowserOptions"
        health:
          $ref: "#/components/schemas/WorkerHealth"
        processedCount:
          type: integer
        errorCount:
          type: integer
        errorHistory:
          type: array
          items:
            $ref: "#/components/schemas/ErrorRecord"
        currentTask:
          $ref: "#/components/schemas/CurrentTask"
    PendingTask:
      type: object
      description: |
        Snapshot of a task waiting in the queue. `queuedMs` is computed at
        response-build time as `now - enqueuedAt` and is preserved across
        retries (so a task stuck in retry loops shows its true total age).
      required: [taskId, url, labels, enqueuedAt, queuedMs, retryCount]
      additionalProperties: false
      properties:
        taskId:
          type: string
        url:
          type: string
        labels:
          type: array
          items:
            type: string
        correlationId:
          type: string
        enqueuedAt:
          type: string
          format: date-time
        queuedMs:
          type: integer
        retryCount:
          type: integer
    ProcessingTask:
      type: object
      description: |
        Snapshot of a task currently being processed by a worker. Mirrors
        `PendingTask` but adds `workerIndex`, `startedAt`, and
        `elapsedMs` so callers can correlate the processing task with the
        owning worker and see how long it has been running.
      required:
        - taskId
        - url
        - labels
        - enqueuedAt
        - queuedMs
        - retryCount
        - workerIndex
        - startedAt
        - elapsedMs
      additionalProperties: false
      properties:
        taskId:
          type: string
        url:
          type: string
        labels:
          type: array
          items:
            type: string
        correlationId:
          type: string
        enqueuedAt:
          type: string
          format: date-time
        queuedMs:
          type: integer
        retryCount:
          type: integer
        workerIndex:
          type: integer
        startedAt:
          type: string
          format: date-time
        elapsedMs:
          type: integer
    QueueSnapshot:
      type: object
      description: |
        Container for runtime queue introspection. `pendingTasks` is the
        head of the pending queue; `processingTasks` is the set of tasks
        currently held by busy workers (one per busy worker).
      required: [pendingTasks, processingTasks]
      additionalProperties: false
      properties:
        pendingTasks:
          type: array
          items:
            $ref: "#/components/schemas/PendingTask"
        processingTasks:
          type: array
          items:
            $ref: "#/components/schemas/ProcessingTask"
    StatusResponse:
      type: object
      required:
        - pending
        - processing
        - completed
        - operationalWorkers
        - totalWorkers
        - isRunning
        - isDegraded
        - workers
        - queue
      additionalProperties: false
      properties:
        pending:
          type: integer
        processing:
          type: integer
        completed:
          type: integer
        operationalWorkers:
          type: integer
        totalWorkers:
          type: integer
        isRunning:
          type: boolean
        isDegraded:
          type: boolean
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerInfo"
        queue:
          $ref: "#/components/schemas/QueueSnapshot"
