# data/sample.yaml — minimal smoke fixture.
#
# Each entry's `labels` becomes part of the captured filename:
#   {taskId}_{correlationId}_{labels-joined-by-dash}.{ext}
#
# Numeric tickers (e.g. 9202) are coerced to strings by the YAML loader.

- labels: ["Apple"]
  url: https://www.apple.com/

- labels: ["Microsoft"]
  url: https://www.microsoft.com/

- labels: ["Cloudflare"]
  url: https://www.cloudflare.com/

- labels: [9202, "ANAHoldings"]
  url: https://www.ana.co.jp/group/

- labels: ["Datadog"]
  url: https://www.datadoghq.com/
