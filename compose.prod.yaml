# compose.prod.yaml — production-flavour stack.
#
# Differences from compose.dev.yaml:
#   - chromium-server-{1,2} use the headless production Dockerfile and
#     do not expose noVNC ports.
#   - waggle uses the multi-stage `runtime` target (runs compiled dist/).
#   - both browserhive and the chromium servers carry `restart: unless-stopped`.
#   - browserhive has an HTTP healthcheck; waggle waits for it.
#   - postgres carries no host port mapping (internal-only).
#   - migrations + sample seeding run automatically before waggle in the
#     `--profile run` smoke flow (waggle-migrator + waggle-seeder).
#
# **Pin every `*_REF` env in real deployments** (a tag or commit SHA),
# `main` is for convenience only.

networks:
  chromium-network:
    name: chromium-network

volumes:
  postgres-data:
    name: waggle-postgres-data-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: waggle-postgres-prod
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-waggle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waggle}
      POSTGRES_DB: ${POSTGRES_DB:-waggle}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waggle} -d ${POSTGRES_DB:-waggle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  chromium-server-1:
    build:
      context: ${CHROMIUM_SERVER_REPO:-https://github.com/uraitakahito/chromium-server-docker.git#${CHROMIUM_SERVER_REF:-main}}
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID:-1000}
        group_id: ${GROUP_ID:-1000}
    container_name: waggle-chromium-server-1-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  chromium-server-2:
    build:
      context: ${CHROMIUM_SERVER_REPO:-https://github.com/uraitakahito/chromium-server-docker.git#${CHROMIUM_SERVER_REF:-main}}
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID:-1000}
        group_id: ${GROUP_ID:-1000}
    container_name: waggle-chromium-server-2-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  browserhive:
    build:
      context: ${BROWSERHIVE_REPO:-https://github.com/uraitakahito/browserhive.git#${BROWSERHIVE_REF:-main}}
      dockerfile: Dockerfile.prod
    container_name: waggle-browserhive-prod
    init: true
    ports:
      - "${BROWSERHIVE_HOST_PORT:-8080}:8080"
    environment:
      LOG_LEVEL: ${BROWSERHIVE_LOG_LEVEL:-info}
      BROWSERHIVE_BROWSER_URLS: http://chromium-server-1:9222,http://chromium-server-2:9222
      BROWSERHIVE_OUTPUT_DIR: /app/output
      TZ: ${TZ:-Asia/Tokyo}
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'node -e "fetch(''http://localhost:8080/v1/status'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # One-shot service that applies pending DB migrations and exits. Runs
  # before `waggle` in the `run` profile so the schema is ready by the
  # time the CLI queries it.
  waggle-migrator:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: waggle:latest
    container_name: waggle-migrator-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    entrypoint: ["node", "dist/db/migrate.js", "up"]
    profiles: ["run"]

  # One-shot service that loads `db/seeds/sample.sql` (the smoke-test
  # fixture) into the urls table. Runs after the migrator, before
  # waggle. Real deployments should not rely on this — they are
  # expected to populate `urls` through their own pipeline — but the
  # `--profile run` smoke test depends on it for end-to-end
  # demonstration.
  waggle-seeder:
    image: waggle:latest
    container_name: waggle-seeder-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      waggle-migrator:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    entrypoint: ["node", "dist/db/seed.js", "up"]
    profiles: ["run"]

  waggle:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: waggle:latest
    container_name: waggle-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      browserhive:
        condition: service_healthy
      waggle-seeder:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BROWSERHIVE_SERVER: http://browserhive:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    # Default smoke args for `docker compose -f compose.prod.yaml --profile run up`.
    # Override per-invocation with `docker compose run --rm waggle <args>`.
    command:
      - "--jpeg"
      - "--limit"
      - "3"
    profiles: ["run"]
