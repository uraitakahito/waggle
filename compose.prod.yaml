# compose.prod.yaml — production-flavour stack.
#
# Differences from compose.dev.yaml:
#   - chromium-server-{1,2} use the headless production Dockerfile and
#     do not expose noVNC ports.
#   - waggle uses the multi-stage `runtime` target (runs compiled dist/).
#   - both browserhive and the chromium servers carry `restart: unless-stopped`.
#   - browserhive has an HTTP healthcheck; waggle waits for it.
#   - postgres carries no host port mapping (internal-only).
#   - migrations + sample seeding run automatically before waggle in the
#     `--profile run` smoke flow (waggle-migrator + waggle-seeder).
#
# `BROWSERHIVE_REF` defaults to the pinned tag (`1.5.1`); bump it via
# the `BROWSERHIVE_VERSION` constant in `setup.sh` (which also drives
# `package.json#openapi:sync` and the `etc/seaweedfs/*` download). For
# `CHROMIUM_SERVER_REF` (still `main`-by-default), pin to a tag or
# commit SHA per deployment for full reproducibility.

networks:
  chromium-network:
    name: chromium-network

volumes:
  postgres-data:
    name: waggle-postgres-data-prod
  seaweedfs-data:
    name: waggle-seaweedfs-data-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: waggle-postgres-prod
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-waggle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waggle}
      POSTGRES_DB: ${POSTGRES_DB:-waggle}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waggle} -d ${POSTGRES_DB:-waggle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  chromium-server-1:
    build:
      context: ${CHROMIUM_SERVER_REPO:-https://github.com/uraitakahito/chromium-server-docker.git#${CHROMIUM_SERVER_REF:-main}}
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID:-1000}
        group_id: ${GROUP_ID:-1000}
    container_name: waggle-chromium-server-1-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  chromium-server-2:
    build:
      context: ${CHROMIUM_SERVER_REPO:-https://github.com/uraitakahito/chromium-server-docker.git#${CHROMIUM_SERVER_REF:-main}}
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID:-1000}
        group_id: ${GROUP_ID:-1000}
    container_name: waggle-chromium-server-2-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # SeaweedFS — S3-compatible artifact store bundled alongside BrowserHive.
  # The compose stack runs it network-internal only (no host ports). For
  # external S3 (AWS / R2 / MinIO-compatible managed services), override
  # BROWSERHIVE_S3_ENDPOINT on the browserhive service; this service
  # stays idle but does not interfere.
  #
  # `etc/seaweedfs/{entrypoint.sh,init-bucket.sh,s3.template.json}` is
  # downloaded by `./setup.sh` from the pinned BROWSERHIVE_VERSION tag.
  seaweedfs:
    image: chrislusf/seaweedfs:4.23
    container_name: waggle-seaweedfs-prod
    init: true
    entrypoint: ["/etc/seaweedfs/entrypoint.sh"]
    environment:
      BROWSERHIVE_S3_ACCESS_KEY_ID: ${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      BROWSERHIVE_S3_SECRET_ACCESS_KEY: ${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
    expose:
      - "8333"
      - "8888"
      - "9333"
    volumes:
      - ./etc/seaweedfs:/etc/seaweedfs:ro
      - seaweedfs-data:/data
    networks:
      - chromium-network
    healthcheck:
      # SeaweedFS binds to IPv4 only; `localhost` resolves to `::1`
      # first in the container and fails. Probe 127.0.0.1 explicitly.
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  # One-shot init: create the configured bucket and exit. Bucket name is
  # interpolated by docker compose at parse time so the container does
  # not read env at runtime.
  seaweedfs-init:
    image: chrislusf/seaweedfs:4.23
    container_name: waggle-seaweedfs-init-prod
    depends_on:
      seaweedfs:
        condition: service_healthy
    volumes:
      - ./etc/seaweedfs:/etc/seaweedfs:ro
    networks:
      - chromium-network
    entrypoint:
      - "/etc/seaweedfs/init-bucket.sh"
      - "${BROWSERHIVE_S3_BUCKET:-browserhive}"
      - "seaweedfs:9333"

  browserhive:
    build:
      context: ${BROWSERHIVE_REPO:-https://github.com/uraitakahito/browserhive.git#${BROWSERHIVE_REF:-1.5.1}}
      dockerfile: Dockerfile.prod
    container_name: waggle-browserhive-prod
    init: true
    ports:
      - "${BROWSERHIVE_HOST_PORT:-8080}:8080"
    environment:
      LOG_LEVEL: ${BROWSERHIVE_LOG_LEVEL:-info}
      BROWSERHIVE_BROWSER_URLS: http://chromium-server-1:9222,http://chromium-server-2:9222
      BROWSERHIVE_S3_ENDPOINT: http://seaweedfs:8333
      BROWSERHIVE_S3_REGION: ${BROWSERHIVE_S3_REGION:-us-east-1}
      BROWSERHIVE_S3_BUCKET: ${BROWSERHIVE_S3_BUCKET:-browserhive}
      BROWSERHIVE_S3_ACCESS_KEY_ID: ${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      BROWSERHIVE_S3_SECRET_ACCESS_KEY: ${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
      # Bundled SeaweedFS does not have wildcard DNS for the bucket
      # subdomain, so virtual-hosted-style addressing fails ("getaddrinfo
      # ENOTFOUND browserhive.seaweedfs"). Opt in to path-style here so
      # the bundled stack works out of the box. The default for the
      # BrowserHive image itself is virtual-hosted-style (AWS S3); leave
      # this unset / false when pointing at AWS.
      BROWSERHIVE_S3_FORCE_PATH_STYLE: "true"
      TZ: ${TZ:-Asia/Tokyo}
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'node -e "fetch(''http://localhost:8080/v1/status'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # One-shot service that applies pending DB migrations and exits. Runs
  # before `waggle` in the `run` profile so the schema is ready by the
  # time the CLI queries it.
  waggle-migrator:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: waggle:latest
    container_name: waggle-migrator-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    entrypoint: ["node", "dist/db/migrate.js", "up"]
    profiles: ["run"]

  # One-shot service that loads `db/seeds/sample.sql` (the smoke-test
  # fixture) into the urls table. Runs after the migrator, before
  # waggle. Real deployments should not rely on this — they are
  # expected to populate `urls` through their own pipeline — but the
  # `--profile run` smoke test depends on it for end-to-end
  # demonstration.
  waggle-seeder:
    image: waggle:latest
    container_name: waggle-seeder-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      waggle-migrator:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    entrypoint: ["node", "dist/db/seed.js", "up"]
    profiles: ["run"]

  waggle:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: waggle:latest
    container_name: waggle-prod
    init: true
    networks:
      - chromium-network
    depends_on:
      browserhive:
        condition: service_healthy
      waggle-seeder:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BROWSERHIVE_SERVER: http://browserhive:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-waggle}:${POSTGRES_PASSWORD:-waggle}@postgres:5432/${POSTGRES_DB:-waggle}
    # Default smoke args for `docker compose -f compose.prod.yaml --profile run up`.
    # Override per-invocation with `docker compose run --rm waggle <args>`.
    command:
      - "--webp"
      - "--limit"
      - "3"
    profiles: ["run"]
